name: ibkr-relay

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: on-failure
    env_file: .env
    environment:
      TWOFA_TIMEOUT_ACTION: exit
      RELOGIN_AFTER_TWOFA_TIMEOUT: "no"
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: "no"
      TZ: ${TIME_ZONE:-America/New_York}
    expose:
      - "4003"
      - "4004"
      - "5900"

  novnc:
    image: theasp/novnc:latest
    restart: always
    depends_on:
      - ib-gateway
    environment:
      DISPLAY_WIDTH: 1024
      DISPLAY_HEIGHT: 768
      RUN_XTERM: "no"
    expose:
      - "8080"
    volumes:
      - ./novnc/index.html:/usr/share/novnc/index.html:ro
    entrypoint:
      ["websockify", "--web", "/usr/share/novnc", "8080", "ib-gateway:5900"]

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - novnc
    ports:
      - "80:80"
      - "443:443"
    environment:
      VNC_DOMAIN: ${VNC_DOMAIN:?Set VNC_DOMAIN in .env}
      TRADE_DOMAIN: ${TRADE_DOMAIN:?Set TRADE_DOMAIN in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  webhook-relay:
    build: ./remote-client
    restart: always
    depends_on:
      - ib-gateway
    env_file: .env
    environment:
      IB_HOST: ib-gateway
      IB_LIVE_PORT: "4003"
      IB_PAPER_PORT: "4004"
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
    expose:
      - "5000"

  poller:
    build: ./poller
    restart: always
    env_file: .env
    environment:
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
    expose:
      - "8000"
    volumes:
      - poller-data:/data

  gateway-controller:
    build: ./gateway-controller
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9000"

volumes:
  poller-data:
  caddy-data:
  caddy-config:
